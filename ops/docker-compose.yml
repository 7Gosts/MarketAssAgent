version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - STOCK_ANALYSIS_CRYPTO_CONFIG=/run/marketass/analysis_defaults.yaml
    env_file:
      - ../.env
    volumes:
      - ../runtime/config/analysis_defaults.yaml:/run/marketass/analysis_defaults.yaml:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: 111
      POSTGRES_DB: stock_analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_analysis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
